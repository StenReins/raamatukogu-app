<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="scripts/main.js"></script>
    <script src="scripts/nav.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <title>Bookshelf app</title>
</head>
<body class="lato-regular">
    <div id="root">
        <header>
            <h1>Bookshelf app</h1>
            <div class="spacer"></div>
            <nav class="nav-btns">
                <a href="/">
                    <iconify-icon icon="ic:baseline-local-library" data-inline="false" width="32" class="icon-button"></iconify-icon>
                </a>
                <a href="/search">
                    <iconify-icon icon="ic:baseline-search" data-inline="false" width="32"></iconify-icon>
                </a>
                <a href="/statistics">
                    <iconify-icon icon="ic:baseline-bar-chart" data-inline="false" width="32"></iconify-icon>
                </a>
                <a href="/settings">
                    <iconify-icon icon="ic:outline-settings" data-inline="false" width="32"></iconify-icon>
                </a>
            </nav>
        </header>
        <main>
            <h2>Your Library</h2>
            <div class="bookshelf-wrapper">
                <div class="bookshelf">
                    <div class="shelf">
                        <div class="label">
                            <h3 class="clickable short">Wishlist 🎁</h3>
                        </div>
                        <div class="arrow-flex">
                            <button>
                                <iconify-icon icon="material-symbols:arrow-back-rounded" width="24" height="24" class="arrow clickable"></iconify-icon>
                            </button>
                            <div class="spacer"></div>
                            <button>
                                <iconify-icon icon="material-symbols:arrow-back-rounded" width="24" height="24" class="arrow clickable reverse"></iconify-icon>
                            </button>
                        </div>
                        <article class="shelf-grid">
                            <div class="book">
                                <a href="/">
                                    <img src="resources/test-cover.jpg" alt="Test cover">
                                </a>
                            </div>
                            <div class="book">
                                <a href="/">
                                    <img src="resources/test-cover2.jpg" alt="Test cover"> 
                                </a>                               
                            </div>
                            <div class="book">
                                <a href="/">
                                    <img src="resources/test-cover.jpg" alt="Test cover"> 
                                </a>                               
                            </div>
                            <div class="book">
                                <a href="/">
                                    <img src="resources/test-cover.jpg" alt="Test cover"> 
                                </a>                               
                            </div>
                        </article>
                    </div>                
                    <div class="shelf">
                        <div class="label">
                            <h3 class="clickable">Currently reading 📖</h3>
                        </div>    
                        <div class="arrow-flex">
                            <button>
                                <iconify-icon icon="material-symbols:arrow-back-rounded" width="24" height="24" class="arrow clickable"></iconify-icon>
                            </button>
                            <div class="spacer"></div>
                            <button>
                                <iconify-icon icon="material-symbols:arrow-back-rounded" width="24" height="24" class="arrow clickable reverse"></iconify-icon>
                            </button>
                        </div>
                        <article class="shelf-grid">
                        </article>
                    </div>
                    <div class="shelf">
                        <div class="label">
                            <h3 class="clickable short">Finished 🥇</h3>
                        </div>
                        <article class="shelf-grid"></article>
                        <div class="arrow-flex">
                            <button>
                                <iconify-icon icon="material-symbols:arrow-back-rounded" width="24" height="24" class="arrow clickable"></iconify-icon>
                            </button>
                            <div class="spacer"></div>
                            <button>
                                <iconify-icon icon="material-symbols:arrow-back-rounded" width="24" height="24" class="arrow clickable reverse"></iconify-icon>
                            </button>
                        </div>                   
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <p>Project made for course "Kasutajaliidese disain ja arendus" by Lisanne Järv and Sten Reins</p>
        </footer>
    </div>
</body>
</html>
